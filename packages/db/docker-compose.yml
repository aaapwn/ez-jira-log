name: ez-jira-log

services:
  postgres:
    image: postgres
    container_name: ez-jira-log-postgres
    environment:
      POSTGRES_DB: ez-jira-log
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ez-jira-log_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ez-jira-log_postgres_data:
